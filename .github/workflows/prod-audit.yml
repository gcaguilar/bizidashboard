name: Production Audit

on:
  workflow_dispatch:

concurrency:
  group: prod-audit-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  production-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Crawl production
        run: bun run qa:audit:prod -- --output ops/site-audit-report-prod-ci.json

      - name: Enforce production QA gate
        run: bun run qa:audit:check -- --input ops/site-audit-report-prod-ci.json

      - name: Upload production audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-audit-report
          path: ops/site-audit-report-prod-ci.json
