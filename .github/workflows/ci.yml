name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bizidashboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bizidashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    permissions:
      actions: write
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bizidashboard?schema=zaragoza
      CITY: zaragoza
      JWT_SECRET: ci-jwt-secret-that-is-at-least-32-characters-long
      SIGNATURE_SECRET: ci-signature-secret-that-is-at-least-characters-too
      NODE_ENV: test
      VITE_UMAMI_SCRIPT_SRC: https://analytics.example.com/script.js
      VITE_UMAMI_WEBSITE_ID: ci-website-id
      VITE_UMAMI_HOST_URL: https://analytics.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run database migrations
        run: bunx prisma migrate deploy

      - name: Seed QA database
        run: bun run qa:seed

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
