name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      clear-cache:
        description: 'Clear cache before running'
        required: false
        default: 'false'
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      DATABASE_URL: file:./dev.db
      NODE_ENV: test
    steps:
      - name: Clear cache
        if: inputs.clear-cache == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const caches = await github.rest.actions.listCaches({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            for (const cache of caches.data.actions_caches) {
              await github.rest.actions.deleteCache({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
              console.log(`Deleted cache: ${cache.key}`);
            }
            console.log(`Total caches deleted: ${caches.data.actions_caches.length}`);

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
