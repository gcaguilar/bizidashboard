name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      clear-cache:
        description: 'Clear cache before running'
        required: false
        default: 'false'
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bizidashboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bizidashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    permissions:
      actions: write
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bizidashboard?schema=zaragoza
      CITY: zaragoza
      JWT_SECRET: ci-jwt-secret
      SIGNATURE_SECRET: ci-signature-secret
      NODE_ENV: test
      APP_URL: https://ci.datosbizi.test
      ROBOTS_BASE_URL: https://ci.datosbizi.test
    steps:
      - name: Clear cache
        if: inputs.clear-cache == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const caches = await github.rest.actions.listCaches({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            for (const cache of caches.data.actions_caches) {
              await github.rest.actions.deleteCache({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
              console.log(`Deleted cache: ${cache.key}`);
            }
            console.log(`Total caches deleted: ${caches.data.actions_caches.length}`);

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run database migrations
        run: bunx prisma migrate deploy

      - name: Seed QA database
        run: bun run qa:seed

      - name: Lint
        run: bun run lint

      - name: Validate SEO base URL env
        run: bun run qa:validate:site-env

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Install Playwright browser
        run: bun run test:e2e:install

      - name: E2E smoke tests
        run: bun run test:e2e tests/e2e/public-navigation.spec.ts tests/e2e/dashboard-navigation-and-filters.spec.ts

      - name: Site audit gate
        run: |
          bun run start --port 3000 &
          SERVER_PID=$!
          sleep 8
          bun run qa:audit --base-url http://127.0.0.1:3000 --output ops/site-audit-report-ci.json
          bun run qa:audit:check --input ops/site-audit-report-ci.json
          kill $SERVER_PID

      - name: Dependency vulnerability scan
        run: bun run security:audit

