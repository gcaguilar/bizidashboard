services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/dev.db
    volumes:
      - app-data:/data
    command:
      [
        "/bin/sh",
        "-c",
        "bun prisma migrate deploy --schema prisma/schema.prisma",
      ]
    restart: "no"

  app:
    image: ${BIZIDASHBOARD_IMAGE:-bizidashboard:local}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: file:/data/dev.db
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  collect-cron:
    image: alpine:3.21
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./ops/collect.cron:/etc/crontabs/root:ro
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-data:
  redis-data:
