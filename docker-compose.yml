services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizi_password}
      POSTGRES_DB: ${POSTGRES_DB:-bizidashboard}
    command: postgres -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bizi-zaragoza:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=${CITY:-zaragoza}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET}
      - GBFS_URL=${GBFS_URL:-https://zaragoza.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-madrid:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=madrid
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET}
      - GBFS_URL=${GBFS_URL:-https://madrid.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-barcelona:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=barcelona
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET}
      - GBFS_URL=${GBFS_URL:-https://barcelona-sp.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  collect-zaragoza:
    image: alpine:3.21
    depends_on:
      bizi-zaragoza:
        condition: service_healthy
    volumes:
      - ./ops/collect-zaragoza.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-madrid:
    image: alpine:3.21
    depends_on:
      bizi-madrid:
        condition: service_healthy
    volumes:
      - ./ops/collect-madrid.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-barcelona:
    image: alpine:3.21
    depends_on:
      bizi-barcelona:
        condition: service_healthy
    volumes:
      - ./ops/collect-barcelona.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

volumes:
  postgres-data:
  redis-data:
