services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bizi
      POSTGRES_PASSWORD: bizi_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bizi-zaragoza:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=zaragoza
      - DATABASE_URL=postgres://bizi:bizi_password@postgres:5432/bizidashboard_zaragoza
      - GBFS_URL=https://zaragoza.publicbikesystem.net/customer/gbfs/v2/gbfs.json
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - SQLITE_SOURCE_PATH=/app/prisma/dev.db
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-madrid:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=madrid
      - DATABASE_URL=postgres://bizi:bizi_password@postgres:5432/bizidashboard_madrid
      - GBFS_URL=https://madrid.publicbikesystem.net/customer/gbfs/v2/gbfs.json
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-barcelona:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CITY=barcelona
      - DATABASE_URL=postgres://bizi:bizi_password@postgres:5432/bizidashboard_barcelona
      - GBFS_URL=https://barcelona-sp.publicbikesystem.net/customer/gbfs/v2/gbfs.json
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  collect-zaragoza:
    image: alpine:3.21
    depends_on:
      bizi-zaragoza:
        condition: service_healthy
    volumes:
      - ./ops/collect-zaragoza.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-madrid:
    image: alpine:3.21
    depends_on:
      bizi-madrid:
        condition: service_healthy
    volumes:
      - ./ops/collect-madrid.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-barcelona:
    image: alpine:3.21
    depends_on:
      bizi-barcelona:
        condition: service_healthy
    volumes:
      - ./ops/collect-barcelona.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

volumes:
  postgres-data:
  redis-data:
