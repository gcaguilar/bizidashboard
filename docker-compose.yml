services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizi_password}
      POSTGRES_DB: ${POSTGRES_DB:-bizidashboard}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bizi-zaragoza:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACE_SAMPLE_RATE: ${VITE_SENTRY_TRACE_SAMPLE_RATE:-0.2}
        VITE_UMAMI_SCRIPT_SRC: ${VITE_UMAMI_SCRIPT_SRC:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_HOST_URL: ${VITE_UMAMI_HOST_URL:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_UMAMI_SCRIPT_SRC: ${NEXT_PUBLIC_UMAMI_SCRIPT_SRC:-https://cloud.umami.is/script.js}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        NEXT_PUBLIC_UMAMI_HOST_URL: ${NEXT_PUBLIC_UMAMI_HOST_URL:-https://api-gateway.umami.dev}
    environment:
      - CITY=${CITY:-zaragoza}
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET:?SIGNATURE_SECRET is required}
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
      - PUBLIC_API_KEY=${PUBLIC_API_KEY:-}
      - GBFS_URL=${GBFS_URL:-https://zaragoza.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REQUIRE_SIGNED_MOBILE_REQUESTS=${REQUIRE_SIGNED_MOBILE_REQUESTS:-false}
      - MOBILE_API_ENABLED=${MOBILE_API_ENABLED:-false}
      - MOBILE_API_ALLOWED_ORIGINS=${MOBILE_API_ALLOWED_ORIGINS:-}
      - NODE_ENV=${NODE_ENV:-production}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACE_SAMPLE_RATE=${SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
      - VITE_SENTRY_TRACE_SAMPLE_RATE=${VITE_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_UMAMI_SCRIPT_SRC=${VITE_UMAMI_SCRIPT_SRC:-}
      - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID:-}
      - VITE_UMAMI_HOST_URL=${VITE_UMAMI_HOST_URL:-}
      - CSP_REPORT_ONLY=${CSP_REPORT_ONLY:-true}
      - CSP_SCRIPT_SRC_ORIGINS=${CSP_SCRIPT_SRC_ORIGINS:-}
      - CSP_CONNECT_SRC_ORIGINS=${CSP_CONNECT_SRC_ORIGINS:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE=${NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - NEXT_PUBLIC_UMAMI_SCRIPT_SRC=${NEXT_PUBLIC_UMAMI_SCRIPT_SRC:-https://cloud.umami.is/script.js}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      - NEXT_PUBLIC_UMAMI_HOST_URL=${NEXT_PUBLIC_UMAMI_HOST_URL:-https://api-gateway.umami.dev}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-madrid:
    image: bizidashboard-bizi-zaragoza:latest
    environment:
      - CITY=madrid
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET:?SIGNATURE_SECRET is required}
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
      - PUBLIC_API_KEY=${PUBLIC_API_KEY:-}
      - GBFS_URL=${GBFS_URL:-https://madrid.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REQUIRE_SIGNED_MOBILE_REQUESTS=${REQUIRE_SIGNED_MOBILE_REQUESTS:-false}
      - MOBILE_API_ENABLED=${MOBILE_API_ENABLED:-false}
      - MOBILE_API_ALLOWED_ORIGINS=${MOBILE_API_ALLOWED_ORIGINS:-}
      - NODE_ENV=${NODE_ENV:-production}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACE_SAMPLE_RATE=${SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
      - VITE_SENTRY_TRACE_SAMPLE_RATE=${VITE_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_UMAMI_SCRIPT_SRC=${VITE_UMAMI_SCRIPT_SRC:-}
      - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID:-}
      - VITE_UMAMI_HOST_URL=${VITE_UMAMI_HOST_URL:-}
      - CSP_REPORT_ONLY=${CSP_REPORT_ONLY:-true}
      - CSP_SCRIPT_SRC_ORIGINS=${CSP_SCRIPT_SRC_ORIGINS:-}
      - CSP_CONNECT_SRC_ORIGINS=${CSP_CONNECT_SRC_ORIGINS:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE=${NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - NEXT_PUBLIC_UMAMI_SCRIPT_SRC=${NEXT_PUBLIC_UMAMI_SCRIPT_SRC:-https://cloud.umami.is/script.js}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      - NEXT_PUBLIC_UMAMI_HOST_URL=${NEXT_PUBLIC_UMAMI_HOST_URL:-https://api-gateway.umami.dev}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bizi-barcelona:
    image: bizidashboard-bizi-zaragoza:latest
    environment:
      - CITY=barcelona
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SIGNATURE_SECRET=${SIGNATURE_SECRET:?SIGNATURE_SECRET is required}
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
      - PUBLIC_API_KEY=${PUBLIC_API_KEY:-}
      - GBFS_URL=${GBFS_URL:-https://barcelona-sp.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REQUIRE_SIGNED_MOBILE_REQUESTS=${REQUIRE_SIGNED_MOBILE_REQUESTS:-false}
      - MOBILE_API_ENABLED=${MOBILE_API_ENABLED:-false}
      - MOBILE_API_ALLOWED_ORIGINS=${MOBILE_API_ALLOWED_ORIGINS:-}
      - NODE_ENV=${NODE_ENV:-production}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACE_SAMPLE_RATE=${SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
      - VITE_SENTRY_TRACE_SAMPLE_RATE=${VITE_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - VITE_UMAMI_SCRIPT_SRC=${VITE_UMAMI_SCRIPT_SRC:-}
      - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID:-}
      - VITE_UMAMI_HOST_URL=${VITE_UMAMI_HOST_URL:-}
      - CSP_REPORT_ONLY=${CSP_REPORT_ONLY:-true}
      - CSP_SCRIPT_SRC_ORIGINS=${CSP_SCRIPT_SRC_ORIGINS:-}
      - CSP_CONNECT_SRC_ORIGINS=${CSP_CONNECT_SRC_ORIGINS:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE=${NEXT_PUBLIC_SENTRY_TRACE_SAMPLE_RATE:-0.2}
      - NEXT_PUBLIC_UMAMI_SCRIPT_SRC=${NEXT_PUBLIC_UMAMI_SCRIPT_SRC:-https://cloud.umami.is/script.js}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      - NEXT_PUBLIC_UMAMI_HOST_URL=${NEXT_PUBLIC_UMAMI_HOST_URL:-https://api-gateway.umami.dev}
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  jobs-zaragoza:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENABLE_INTERNAL_JOBS=${ENABLE_INTERNAL_JOBS:-false}
      - CITY=${CITY:-zaragoza}
      - GBFS_URL=${GBFS_URL:-https://zaragoza.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jobs-madrid:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENABLE_INTERNAL_JOBS=${ENABLE_INTERNAL_JOBS:-false}
      - CITY=${CITY:-madrid}
      - GBFS_URL=${GBFS_URL:-https://madrid.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jobs-barcelona:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bizi:bizi_password@postgres:5432/bizidashboard}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENABLE_INTERNAL_JOBS=${ENABLE_INTERNAL_JOBS:-false}
      - CITY=${CITY:-barcelona}
      - GBFS_URL=${GBFS_URL:-https://barcelona-sp.publicbikesystem.net/customer/gbfs/v2/gbfs.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collect-zaragoza:
    image: alpine:3.21
    depends_on:
      bizi-zaragoza:
        condition: service_healthy
    volumes:
      - ./ops/collect-zaragoza.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-madrid:
    image: alpine:3.21
    depends_on:
      bizi-madrid:
        condition: service_healthy
    volumes:
      - ./ops/collect-madrid.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

  collect-barcelona:
    image: alpine:3.21
    depends_on:
      bizi-barcelona:
        condition: service_healthy
    volumes:
      - ./ops/collect-barcelona.cron:/etc/crontabs/root:ro
    environment:
      - COLLECT_API_KEY=${COLLECT_API_KEY:-change-me}
      - OPS_API_KEY=${OPS_API_KEY:-}
    command:
      [
        "/bin/sh",
        "-c",
        "apk add --no-cache curl >/dev/null && crond -f -l 2",
      ]

volumes:
  postgres-data:
  redis-data:
